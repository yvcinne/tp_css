<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercice 7 : Transitions et animations</title>
    <link rel="stylesheet" href="exercice7.css">
</head>

<body>
    <h1>Exercice 7 : Transitions et animations</h1>

    <!-- ===== 7.1 : Bouton animé ===== -->
    <section class="demo">
        <h2>7.1 – Bouton avec transitions au survol</h2>
        <p>Passez la souris sur le bouton :</p>

        <button class="btn-anime">
            Cliquez-moi !
        </button>

        <button class="btn-outline">
            Bouton outline
        </button>

        <button class="btn-grow">
            Bouton qui grandit
        </button>
    </section>

    <!-- ===== 7.2 : Spinner de chargement ===== -->
    <section class="demo">
        <h2>7.2 – Spinner de chargement (@keyframes)</h2>
        <p>Animation créée avec <code>@keyframes</code> :</p>

        <!-- Spinner simple -->
        <div class="spinner"></div>

        <!-- Spinner avec points -->
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <!-- Barre de progression -->
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </section>

    <a href="index.html">← Retour à l'index</a>
</body>

</html>
