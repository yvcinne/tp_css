<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercice 4 : CSS Grid</title>
    <link rel="stylesheet" href="exercice4.css">
</head>

<body>
    <h1>Exercice 4 : CSS Grid</h1>

    <!-- ===== 4.1 : Grille de cartes responsive ===== -->
    <section class="demo">
        <h2>4.1 – Grille de cartes responsive (auto-fill)</h2>
        <div class="grid-cards">
            <div class="card">Carte 1</div>
            <div class="card">Carte 2</div>
            <div class="card">Carte 3</div>
            <div class="card">Carte 4</div>
            <div class="card">Carte 5</div>
            <div class="card">Carte 6</div>
        </div>
    </section>

    <!-- ===== 4.2 : Layout complet avec Grid Areas ===== -->
    <section class="demo">
        <h2>4.2 – Layout complet avec Grid Areas</h2>
        <div class="page-layout">
            <header class="header">Header</header>
            <nav class="sidebar">Sidebar</nav>
            <main class="main">Contenu principal</main>
            <footer class="footer">Footer</footer>
        </div>
    </section>

    <a href="index.html">← Retour à l'index</a>
</body>

</html>
